name: exkururuSOC CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Syntax check
        run: |
          python -m py_compile \
            src/exkururusoc/app_context.py \
            src/exkururusoc/cli.py \
            src/exkururusoc/config.py \
            src/exkururusoc/replay_cache.py \
            src/exkururusoc/storage.py \
            src/exkururusoc/storage_facade.py \
            src/exkururusoc/routers/*.py \
            tests/*.py

      - name: Tests
        run: |
          pytest -q
